services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - AGENTS_URL=http://agents:8000
    depends_on:
      - agents
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  agents:
    build:
      context: ./services/agents
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEXTJS_URL=http://web:3000
    volumes:
      - ./services/agents:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
